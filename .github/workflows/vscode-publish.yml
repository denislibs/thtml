name: Publish VS Code Extension

on:
  push:
    tags:
      - 'vscode-v*'
  workflow_dispatch:
    inputs:
      pre_release:
        description: 'Publish as pre-release'
        required: false
        default: 'false'
        type: boolean

jobs:
  publish:
    name: Build & Publish Extension
    runs-on: ubuntu-latest
    env:
      VSCE_TOKEN: ${{ secrets.VSCE_TOKEN }}
      OVSX_TOKEN: ${{ secrets.OVSX_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @thtml/core
        run: pnpm --filter @thtml/core build

      - name: Build @thtml/language-server
        run: pnpm --filter @thtml/language-server build

      - name: Build extension
        run: pnpm --filter thtml-vscode build

      - name: Package .vsix
        run: pnpm --filter thtml-vscode exec vsce package
        working-directory: packages/vscode-extension

      - name: Upload .vsix artifact
        uses: actions/upload-artifact@v4
        with:
          name: thtml-vscode.vsix
          path: packages/vscode-extension/*.vsix

      # VS Code Marketplace (requires VSCE_TOKEN secret — Azure DevOps PAT)
      - name: Publish to VS Code Marketplace
        if: ${{ env.VSCE_TOKEN != '' }}
        run: pnpm --filter thtml-vscode exec vsce publish ${{ inputs.pre_release == 'true' && '--pre-release' || '' }}
        env:
          VSCE_PAT: ${{ env.VSCE_TOKEN }}
        continue-on-error: true

      # Open VSX Registry (alternative — register at https://open-vsx.org with GitHub)
      - name: Publish to Open VSX
        if: ${{ env.OVSX_TOKEN != '' }}
        run: npx ovsx publish packages/vscode-extension/*.vsix --pat ${{ env.OVSX_TOKEN }}
        continue-on-error: true
